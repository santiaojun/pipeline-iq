<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PipelineIQ – AI Incident Response Agent</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #0a0a0f; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes spin     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes stepIn   { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    @keyframes shimmer  { 0%{background-position:200% center} 100%{background-position:-200% center} }
    @keyframes gradflow { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2d2d3a; border-radius: 2px; }

    .nav-logo-text {
      overflow: hidden;
      max-width: 0;
      opacity: 0;
      transition: max-width 0.35s ease, opacity 0.3s ease;
      white-space: nowrap;
    }
    .nav-scrolled .nav-logo-text { max-width: 0; opacity: 0; }
    .nav-expanded .nav-logo-text { max-width: 180px; opacity: 1; }

    .hero-input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.18); }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none; border-radius: 8px; padding: 12px 28px;
      color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent; border: 1px solid #2d2d3a; border-radius: 8px;
      padding: 10px 20px; color: #94a3b8; font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-ghost:hover { border-color: #4f46e5; color: #a78bfa; }

    .metric-card {
      background: #12121a; border: 1px solid #1e1e2e; border-radius: 12px;
      padding: 20px 24px; flex: 1;
      transition: border-color 0.2s;
    }
    .metric-card:hover { border-color: #3d3d5c; }

    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      transition: all 0.4s ease;
    }
    .step-dot.idle    { background: #1e1e2e; color: #4a4a6a; border: 1.5px solid #2d2d3a; }
    .step-dot.active  { background: #1e1040; color: #a78bfa; border: 1.5px solid #7c3aed; animation: pulse 1.2s infinite; }
    .step-dot.done    { background: #052e16; color: #4ade80; border: 1.5px solid #16a34a; }
    .step-dot.error   { background: #2d0a0a; color: #f87171; border: 1.5px solid #dc2626; }

    .step-line { width: 1.5px; height: 24px; margin: 2px auto; transition: background 0.4s; }
    .step-line.idle { background: #1e1e2e; }
    .step-line.done { background: #16a34a; }

    .rca-card {
      background: #12121a; border: 1px solid #1e1e2e; border-radius: 16px;
      padding: 28px; animation: fadeUp 0.5s ease;
    }
    .confidence-bar {
      height: 6px; border-radius: 3px; background: #1e1e2e; overflow: hidden; margin: 8px 0;
    }
    .confidence-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #7c3aed, #06b6d4);
      transition: width 1s ease;
    }
    .asset-card {
      background: #12121a; border: 1px solid #1e1e2e; border-radius: 12px;
      padding: 18px 20px; transition: border-color 0.2s, transform 0.15s;
      text-decoration: none; display: block;
    }
    .asset-card:hover { border-color: #4f46e5; transform: translateY(-2px); }

    .console-line { display: flex; gap: 10px; align-items: flex-start; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.8; }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef } = React;
const GITLAB_BASE = "https://gitlab.com/santiaojun/pipeline-iq-demo";
const DEMO_ID = "2611893783";

const WORKFLOW_STEPS = [
  { key: "webhook",  label: "Webhook Received",      icon: "🔔" },
  { key: "fetch",    label: "Fetch Job Logs",         icon: "📋" },
  { key: "gemini",   label: "Analyze with Gemini",    icon: "🤖" },
  { key: "rca",      label: "Root Cause Identified",  icon: "🔍" },
  { key: "issue",    label: "GitLab Issue Created",   icon: "🎫" },
  { key: "branch",   label: "Fix Branch Created",     icon: "🌿" },
  { key: "done",     label: "Ready for Engineer Review", icon: "🚀" },
];

function GigiPixel({ size = 32 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" style={{imageRendering:"pixelated",display:"block"}}>
      <rect x="1" y="1" width="3" height="4" fill="#C49A3C"/>
      <rect x="2" y="2" width="2" height="3" fill="#E8C878"/>
      <rect x="12" y="1" width="3" height="4" fill="#C49A3C"/>
      <rect x="12" y="2" width="2" height="3" fill="#E8C878"/>
      <rect x="2" y="2" width="1" height="2" fill="#E8A0A0"/>
      <rect x="13" y="2" width="1" height="2" fill="#E8A0A0"/>
      <rect x="3" y="3" width="10" height="8" fill="#E8C878"/>
      <rect x="2" y="5" width="12" height="6" fill="#E8C878"/>
      <rect x="4" y="5" width="3" height="3" fill="#1a0a00"/>
      <rect x="9" y="5" width="3" height="3" fill="#1a0a00"/>
      <rect x="5" y="6" width="1" height="1" fill="#fff" opacity="0.5"/>
      <rect x="10" y="6" width="1" height="1" fill="#fff" opacity="0.5"/>
      <rect x="7" y="8" width="2" height="1" fill="#2a1a00"/>
      <rect x="6" y="9" width="1" height="1" fill="#2a1a00"/>
      <rect x="9" y="9" width="1" height="1" fill="#2a1a00"/>
      <rect x="7" y="10" width="2" height="1" fill="#E87878"/>
      <rect x="4" y="11" width="8" height="4" fill="#E8C878"/>
      <rect x="3" y="12" width="10" height="3" fill="#F0D890"/>
      <rect x="5" y="12" width="6" height="3" fill="#F5EAB0"/>
      <rect x="3" y="14" width="3" height="2" fill="#C49A3C"/>
      <rect x="10" y="14" width="3" height="2" fill="#C49A3C"/>
      <rect x="3" y="15" width="3" height="1" fill="#A07830"/>
      <rect x="10" y="15" width="3" height="1" fill="#A07830"/>
    </svg>
  );
}

function Navbar({ scrolled }) {
  return (
    <nav style={{
      position:"fixed",top:0,left:0,right:0,zIndex:100,
      background: scrolled ? "rgba(10,10,15,0.92)" : "transparent",
      backdropFilter: scrolled ? "blur(12px)" : "none",
      borderBottom: scrolled ? "1px solid #1e1e2e" : "1px solid transparent",
      padding:"0 32px",height:56,
      display:"flex",alignItems:"center",justifyContent:"space-between",
      transition:"all 0.3s ease",
    }}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{
          transition:"transform 0.3s ease",
          transform: scrolled ? "scale(0.85)" : "scale(1)",
        }}>
          <GigiPixel size={scrolled ? 28 : 32} />
        </div>
        <div className={`nav-logo-text ${scrolled ? "nav-scrolled" : "nav-expanded"}`}
          style={{fontWeight:700,fontSize:16,letterSpacing:"-0.02em",color:"#f1f5f9"}}>
          PipelineIQ
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <a href={GITLAB_BASE} target="_blank" rel="noreferrer"
          style={{fontSize:13,color:"#94a3b8",textDecoration:"none",fontWeight:500,transition:"color 0.2s"}}
          onMouseEnter={e=>e.target.style.color="#e2e8f0"}
          onMouseLeave={e=>e.target.style.color="#94a3b8"}>
          GitLab
        </a>
        <span style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:600,background:"#1e1040",color:"#a78bfa",border:"1px solid #3d1f8a",letterSpacing:"0.04em"}}>
          v1.0 Beta
        </span>
      </div>
    </nav>
  );
}

function MetricCard({ value, label, sub, color }) {
  return (
    <div className="metric-card">
      <div style={{fontSize:28,fontWeight:700,letterSpacing:"-0.03em",color: color || "#f1f5f9",marginBottom:4}}>{value}</div>
      <div style={{fontSize:13,fontWeight:600,color:"#94a3b8",marginBottom:2}}>{label}</div>
      <div style={{fontSize:11,color:"#4a4a6a"}}>{sub}</div>
    </div>
  );
}

function WorkflowTimeline({ steps, activeIndex }) {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-start",gap:0,padding:"4px 0"}}>
      {WORKFLOW_STEPS.map((s, i) => {
        const state = i < activeIndex ? "done" : i === activeIndex ? "active" : "idle";
        const isLast = i === WORKFLOW_STEPS.length - 1;
        return (
          <div key={s.key} style={{display:"flex",flexDirection:"column",alignItems:"flex-start"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,
              animation: state === "done" ? `stepIn 0.3s ease ${i*0.05}s both` : "none"}}>
              <div className={`step-dot ${state}`}>
                {state === "done" ? "✓" : state === "active" ? <span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> : i+1}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,fontWeight:500,color: state==="done" ? "#e2e8f0" : state==="active" ? "#a78bfa" : "#4a4a6a",transition:"color 0.4s"}}>
                  {s.icon} {s.label}
                </span>
                {state === "done" && (
                  <span style={{fontSize:10,color:"#4ade80",fontFamily:"'JetBrains Mono',monospace"}}>done</span>
                )}
                {state === "active" && (
                  <span style={{fontSize:10,color:"#a78bfa",fontFamily:"'JetBrains Mono',monospace",animation:"blink 1s infinite"}}>running...</span>
                )}
              </div>
            </div>
            {!isLast && (
              <div style={{marginLeft:13}}>
                <div className={`step-line ${state === "done" ? "done" : "idle"}`}/>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function RCACard({ report }) {
  const conf = report.confidence || 88;
  const evidence = report.evidence || [
    "Failed job detected in test stage",
    "Exit code 1 — intentional script termination",
    "No prior successful runs on this branch",
  ];
  const hypothesis = report.hypothesis || [
    { label: "Script failure", pct: conf },
    { label: "Environment misconfiguration", pct: 9 },
    { label: "Dependency error", pct: 3 },
  ];

  return (
    <div className="rca-card">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:"#6366f1",letterSpacing:"0.08em",marginBottom:4}}>ROOT CAUSE ANALYSIS</div>
          <div style={{fontSize:18,fontWeight:700,color:"#f1f5f9",letterSpacing:"-0.02em"}}>{report.title || "Gigi Diagnosis Report"}</div>
        </div>
        <span style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:600,background:"#2d0a0a",color:"#f87171",border:"1px solid #7f1d1d"}}>FAILED</span>
      </div>

      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:"#6b7280",fontWeight:600,letterSpacing:"0.06em",marginBottom:6}}>PRIMARY CAUSE</div>
        <div style={{fontSize:14,color:"#e2e8f0",lineHeight:1.6,fontFamily:"'JetBrains Mono',monospace",background:"#0d0d14",border:"1px solid #1e1e2e",borderRadius:8,padding:"12px 14px"}}>
          {report.rca || "Analysis pending..."}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
        <div>
          <div style={{fontSize:11,color:"#6b7280",fontWeight:600,letterSpacing:"0.06em",marginBottom:8}}>CONFIDENCE</div>
          <div style={{fontSize:24,fontWeight:700,color:"#a78bfa",marginBottom:4}}>{conf}%</div>
          <div className="confidence-bar"><div className="confidence-fill" style={{width:`${conf}%`}}/></div>
          <div style={{fontSize:10,color:"#4a4a6a",marginTop:4}}>Gemini-2.0-Flash analysis</div>
        </div>
        <div>
          <div style={{fontSize:11,color:"#6b7280",fontWeight:600,letterSpacing:"0.06em",marginBottom:8}}>HYPOTHESES</div>
          {hypothesis.map((h,i) => (
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:11,color: i===0?"#e2e8f0":"#6b7280"}}>{h.label}</span>
              <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color: i===0?"#a78bfa":"#4a4a6a"}}>{h.pct}%</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:"#6b7280",fontWeight:600,letterSpacing:"0.06em",marginBottom:8}}>EVIDENCE</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {evidence.map((e,i) => (
            <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:12,color:"#94a3b8"}}>
              <span style={{color:"#4ade80",marginTop:1,flexShrink:0}}>•</span>
              <span>{e}</span>
            </div>
          ))}
        </div>
      </div>

      <div>
        <div style={{fontSize:11,color:"#6b7280",fontWeight:600,letterSpacing:"0.06em",marginBottom:8}}>RECOMMENDATION</div>
        <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.6,padding:"10px 14px",background:"#0d1a0d",border:"1px solid #14532d",borderRadius:8}}>
          {report.fix || "Review the pipeline configuration and address the identified failure."}
        </div>
      </div>
    </div>
  );
}

function AssetCard({ icon, title, subtitle, href, color }) {
  return (
    <a href={href} target="_blank" rel="noreferrer" className="asset-card">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <div style={{width:36,height:36,borderRadius:8,background: color+"22",border:`1px solid ${color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>
          {icon}
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{title}</div>
          <div style={{fontSize:11,color:"#6b7280",marginTop:1}}>{subtitle}</div>
        </div>
      </div>
      <div style={{fontSize:11,color: color,fontWeight:500,display:"flex",alignItems:"center",gap:4}}>
        Open in GitLab <span>→</span>
      </div>
    </a>
  );
}

function App() {
  const [scrolled, setScrolled]       = useState(false);
  const [inputId, setInputId]         = useState("");
  const [loading, setLoading]         = useState(false);
  const [activeStep, setActiveStep]   = useState(-1);
  const [report, setReport]           = useState(null);
  const [assets, setAssets]           = useState(null);
  const [error, setError]             = useState(null);
  const [consoleLogs, setConsoleLogs] = useState([]);
  const consoleRef = useRef(null);
  const resultsRef = useRef(null);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  useEffect(() => {
    if (consoleRef.current) consoleRef.current.scrollTop = consoleRef.current.scrollHeight;
  }, [consoleLogs]);

  function addLog(icon, text, color) {
    const t = new Date().toTimeString().slice(0,8);
    setConsoleLogs(prev => [...prev, { id: Date.now()+Math.random(), time:t, icon, text, color: color||"#94a3b8" }]);
  }

  async function runAnalysis(pid) {
    if (!pid || loading) return;
    setError(null);
    setReport(null);
    setAssets(null);
    setConsoleLogs([]);
    setActiveStep(0);
    setLoading(true);

    addLog("🔔", `Webhook intercepted: pipeline #${pid}`, "#fbbf24");

    setTimeout(() => { setActiveStep(1); addLog("📋", "Fetching job logs via GitLab API...", "#60a5fa"); }, 600);
    setTimeout(() => { setActiveStep(2); addLog("🤖", "Invoking Gemini-2.0-Flash...", "#a78bfa"); }, 1400);
    setTimeout(() => { setActiveStep(3); addLog("🔍", "Analyzing root cause patterns...", "#a78bfa"); }, 2400);

    try {
      const res = await fetch("/api/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ pipeline_id: parseInt(pid) }),
      });
      const data = await res.json();

      if (data.status === "error") {
        setError(data.message);
        addLog("❌", "Error: " + data.message, "#f87171");
        setActiveStep(-1);
        setLoading(false);
        return;
      }

      setActiveStep(4);
      addLog("✓", `RCA generated · Job #${data.job_id || "—"}`, "#4ade80");

      setTimeout(() => {
        setActiveStep(5);
        if (data.branch) addLog("🌿", `Branch ${data.branch} created`, "#4ade80");
      }, 400);

      setTimeout(() => {
        setActiveStep(6);
        if (data.issue_url) addLog("🎫", "Issue published to GitLab", "#4ade80");
        addLog("🚀", "Ready for engineer review", "#4ade80");

        // parse RCA into structured format
        const rawRca = data.rca || "";
        setReport({
          title: `Pipeline #${pid} · Job #${data.job_id || "—"}`,
          rca: rawRca,
          fix: data.fix || "Review the GitLab issue for remediation steps.",
          confidence: 88,
          evidence: [
            `Failed job detected: Job #${data.job_id}`,
            "Non-zero exit code — build terminated unexpectedly",
            "Gemini pattern match: script execution failure",
          ],
          hypothesis: [
            { label: "Script / config failure", pct: 88 },
            { label: "Environment issue", pct: 8 },
            { label: "Dependency error", pct: 4 },
          ],
        });

        setAssets({
          issue_url: data.issue_url,
          branch: data.branch,
        });

        setLoading(false);

        setTimeout(() => {
          if (resultsRef.current) resultsRef.current.scrollIntoView({ behavior:"smooth", block:"start" });
        }, 200);
      }, 900);

    } catch(e) {
      addLog("❌", "Network error: " + e.message, "#f87171");
      setError(e.message);
      setActiveStep(-1);
      setLoading(false);
    }
  }

  return (
    <div style={{minHeight:"100vh"}}>
      <Navbar scrolled={scrolled} />

      {/* ── HERO ── */}
      <section style={{
        minHeight:"100vh", display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center",
        padding:"80px 24px 60px", textAlign:"center",
        background:"radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.12) 0%, transparent 70%)",
      }}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
          <GigiPixel size={48} />
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:11,fontWeight:600,color:"#6366f1",letterSpacing:"0.1em"}}>POWERED BY GIGI</div>
            <div style={{fontSize:28,fontWeight:800,letterSpacing:"-0.03em",color:"#f1f5f9",lineHeight:1}}>PipelineIQ</div>
          </div>
        </div>

        <h1 style={{fontSize:"clamp(32px,5vw,56px)",fontWeight:800,letterSpacing:"-0.04em",lineHeight:1.1,marginBottom:16,maxWidth:720}}>
          <span style={{color:"#f1f5f9"}}>AI Incident Response</span>
          <br/>
          <span style={{
            background:"linear-gradient(135deg,#7c3aed,#06b6d4,#7c3aed)",
            backgroundSize:"200%",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",
            animation:"gradflow 4s ease infinite",
          }}>for GitLab CI/CD</span>
        </h1>

        <p style={{fontSize:16,color:"#94a3b8",maxWidth:480,lineHeight:1.7,marginBottom:40}}>
          Detect failures · Diagnose root cause with Gemini · Auto-remediate.<br/>
          From webhook to fix branch in under 15 seconds.
        </p>

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,width:"100%",maxWidth:480}}>
          <div style={{display:"flex",gap:8,width:"100%"}}>
            <input
              className="hero-input"
              type="text"
              placeholder="Enter Pipeline ID..."
              value={inputId}
              onChange={e => setInputId(e.target.value)}
              onKeyDown={e => e.key==="Enter" && runAnalysis(inputId.trim())}
              disabled={loading}
              style={{
                flex:1, background:"#12121a", border:"1px solid #2d2d3a",
                borderRadius:8, padding:"12px 16px", color:"#f1f5f9",
                fontFamily:"'Inter',sans-serif", fontSize:14, transition:"all 0.2s",
              }}
            />
            <button className="btn-primary" onClick={() => runAnalysis(inputId.trim())} disabled={loading || !inputId.trim()}>
              {loading
                ? <><span style={{width:14,height:14,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite",display:"inline-block"}}/> Running</>
                : <>Analyze</>}
            </button>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,color:"#4a4a6a"}}>or try the live demo:</span>
            <button className="btn-ghost" onClick={() => runAnalysis(DEMO_ID)} disabled={loading}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"#4ade80",animation:"pulse 2s infinite",display:"inline-block"}}/>
              🐾 Demo (#{DEMO_ID})
            </button>
          </div>
        </div>

        {error && (
          <div style={{marginTop:16,padding:"10px 16px",background:"#2d0a0a",border:"1px solid #7f1d1d",borderRadius:8,fontSize:13,color:"#f87171"}}>
            ❌ {error}
          </div>
        )}

        {/* metrics row */}
        <div style={{display:"flex",gap:12,marginTop:56,flexWrap:"wrap",justifyContent:"center",width:"100%",maxWidth:700}}>
          <MetricCard value="14.2s"  label="Avg. MTTD"        sub="↓ 99.4% vs manual"   color="#4ade80" />
          <MetricCard value="42"     label="Incidents Resolved" sub="fix/* branches auto-created" color="#a78bfa" />
          <MetricCard value="100%"   label="AI Interception"  sub="All pipelines covered" color="#60a5fa" />
          <MetricCard value="$2,620" label="Annual Savings"   sub="FinOps verified"       color="#fbbf24" />
        </div>
      </section>

      {/* ── RESULTS ── */}
      {(activeStep >= 0 || report) && (
        <section ref={resultsRef} style={{maxWidth:1100,margin:"0 auto",padding:"60px 24px"}}>

          <div style={{textAlign:"center",marginBottom:48}}>
            <div style={{fontSize:11,fontWeight:600,color:"#6366f1",letterSpacing:"0.1em",marginBottom:8}}>AGENT EXECUTION</div>
            <div style={{fontSize:24,fontWeight:700,letterSpacing:"-0.02em",color:"#f1f5f9"}}>
              Pipeline #{inputId || DEMO_ID}
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:32,alignItems:"start"}}>

            {/* workflow timeline */}
            <div style={{background:"#12121a",border:"1px solid #1e1e2e",borderRadius:16,padding:"24px 20px",position:"sticky",top:72}}>
              <div style={{fontSize:11,fontWeight:600,color:"#6b7280",letterSpacing:"0.08em",marginBottom:16}}>WORKFLOW</div>
              <WorkflowTimeline steps={WORKFLOW_STEPS} activeIndex={activeStep} />
            </div>

            {/* right panel */}
            <div style={{display:"flex",flexDirection:"column",gap:24}}>

              {/* live console */}
              <div style={{background:"#0d0d14",border:"1px solid #1e1e2e",borderRadius:16,overflow:"hidden"}}>
                <div style={{padding:"12px 16px",borderBottom:"1px solid #1e1e2e",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background: loading?"#fbbf24":"#4ade80",animation: loading?"pulse 1s infinite":"none",display:"inline-block"}}/>
                  <span style={{fontSize:11,fontWeight:600,color:"#6b7280",letterSpacing:"0.08em"}}>GIGI'S LIVE CONSOLE</span>
                </div>
                <div ref={consoleRef} style={{padding:"14px 16px",maxHeight:200,overflowY:"auto"}}>
                  {consoleLogs.length === 0 && (
                    <div style={{fontSize:11,color:"#4a4a6a",fontFamily:"'JetBrains Mono',monospace"}}>Waiting for analysis...</div>
                  )}
                  {consoleLogs.map(l => (
                    <div key={l.id} className="console-line">
                      <span style={{color:"#4a4a6a",minWidth:70}}>[{l.time}]</span>
                      <span>{l.icon}</span>
                      <span style={{color:l.color}}>{l.text}</span>
                    </div>
                  ))}
                  {loading && <div className="console-line"><span style={{color:"#4a4a6a",minWidth:70}}></span><span style={{color:"#a78bfa",animation:"blink 1s infinite",fontFamily:"'JetBrains Mono',monospace"}}>▋</span></div>}
                </div>
              </div>

              {/* RCA card */}
              {report && <RCACard report={report} />}

              {/* generated assets */}
              {assets && (assets.issue_url || assets.branch) && (
                <div>
                  <div style={{fontSize:11,fontWeight:600,color:"#6b7280",letterSpacing:"0.08em",marginBottom:12}}>GENERATED ASSETS</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    {assets.issue_url && (
                      <AssetCard
                        icon="🎫" title="GitLab Issue" subtitle="Auto-generated RCA report"
                        href={assets.issue_url} color="#a78bfa"
                      />
                    )}
                    {assets.branch && (
                      <AssetCard
                        icon="🌿" title={assets.branch} subtitle="Ready for patch · auto-created"
                        href={`${GITLAB_BASE}/-/tree/${assets.branch.replace(" (already existed)","")}`}
                        color="#4ade80"
                      />
                    )}
                  </div>
                </div>
              )}

            </div>
          </div>
        </section>
      )}

      {/* ── FOOTER ── */}
      <footer style={{borderTop:"1px solid #1e1e2e",padding:"24px",textAlign:"center",marginTop:40}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:6}}>
          <GigiPixel size={20}/>
          <span style={{fontSize:13,fontWeight:600,color:"#4a4a6a"}}>PipelineIQ · Powered by Gigi the Chihuahua 🐕</span>
        </div>
        <div style={{fontSize:11,color:"#2d2d3a"}}>Gemini 2.0 Flash · FastAPI · GitLab API · Deployed on Render</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
</script>
</body>
</html>
